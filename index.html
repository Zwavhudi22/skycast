<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/styles.css" />
  <title>SkyCast App</title>
</head>
<body>
  <div class="weather-app">
    <header>
      <form class="search-form">
        <input type="search" placeholder="Enter a city.." required class="search-input"/>
        <input type="submit" value="search" class="input-button"/>
      </form>
    </header>
    <main>
      <div>
        <div class="current-weather">
          <h1>
            South Africa
          </h1>
          <p>
            Friday 15:14, scattered clouds
            <br />
            Humidity: 
            <strong>66%</strong>
            , Wind: 
            <strong>3.13km/h</strong>
          </p>
        </div>
        <div class="current-temperature">
          <span class="weather-icon">⛅</span> 
          <span class="weather-temp">13</span>
          <span class="weather-deg">&deg;C</span>
        </div>
      </div>
    </main>
    <footer>
      Coded by
      <a href="https://github.com/Zwavhudi22"> Zwavhudi Nengalavhani</a>, is open-sourced on 
      <a href="https://github.com/Zwavhudi22/skycast">GitHub</a> and hosted on
      <a href="https://skycast-weatherappp.netlify.app/">Netlify</a>
    </footer>
  </div>
</body>
</html>
